<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HedefCounter</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #2d3436;
            --accent-color: #00b894;
            --input-bg: #f1f3f5;
            --shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-color: #f5f5f5;
            --accent-color: #00d2a0;
            --input-bg: #2d2d2d;
            --shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        body {
            font-family: 'Comfortaa', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            transition: background 0.4s ease;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 40px;
            box-shadow: var(--shadow);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h2 { font-weight: 700; margin-bottom: 1.5rem; }

        .input-group { margin-bottom: 1.2rem; text-align: left; }

        label { display: block; margin-left: 15px; margin-bottom: 8px; font-size: 0.85rem; opacity: 0.8; }

        input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 50px;
            border: none;
            background: var(--input-bg);
            color: var(--text-color);
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: transform 0.2s;
        }

        input:focus { transform: scale(1.02); }

        .progress-container {
            background: var(--input-bg);
            border-radius: 50px;
            height: 35px;
            width: 100%;
            margin: 25px 0;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-color), #55efc4);
            transition: width 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 30px;
            background: var(--input-bg);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .theme-toggle {
            position: fixed;
            top: 25px;
            right: 25px;
            cursor: pointer;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: var(--card-bg);
            color: var(--text-color);
            box-shadow: var(--shadow);
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .theme-toggle:hover { transform: rotate(15deg); }

        /* Konfeti canvas - ekranı tamamen kaplar, tıklamaları geçirir */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙</button>

<div class="container">
    <h2>HedefCounter</h2>

    <div class="input-group">
        <label>🎯 Hedef Tutar</label>
        <input type="number" id="target" placeholder="15000" oninput="calculate()">
    </div>

    <div class="input-group">
        <label>💰 Mevcut Para</label>
        <input type="number" id="current" placeholder="5750" oninput="calculate()">
    </div>

    <div class="input-group">
        <label>🗓️ Günlük Birikim</label>
        <input type="number" id="daily" value="125" oninput="calculate()">
    </div>

    <div class="progress-container">
        <div id="bar" class="progress-bar">0%</div>
    </div>

    <div id="resultBox" class="result">
        Hesaplamak için değerleri giriniz...
    </div>
</div>

<script>
    /* ── Tema ── */
    const currentTheme = localStorage.getItem('theme') || 'light';
    if (currentTheme === 'dark') {
        document.body.setAttribute('data-theme', 'dark');
        document.getElementById('themeBtn').innerText = '☀️';
    }

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeBtn');
        if (body.hasAttribute('data-theme')) {
            body.removeAttribute('data-theme');
            btn.innerText = '🌙';
            localStorage.setItem('theme', 'light');
        } else {
            body.setAttribute('data-theme', 'dark');
            btn.innerText = '☀️';
            localStorage.setItem('theme', 'dark');
        }
    }

    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animationId = null;

    const COLORS = ['#00b894','#55efc4','#fdcb6e','#e17055','#6c5ce7','#fd79a8','#0984e3'];

    function resizeCanvas() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function createParticle(x, y) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 8 + 3;
        return {
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 6,
            color: COLORS[Math.floor(Math.random() * COLORS.length)],
            width:  Math.random() * 10 + 6,
            height: Math.random() * 6  + 4,
            rotation: Math.random() * 360,
            rotSpeed: (Math.random() - 0.5) * 8,
            alpha: 1,
            gravity: 0.25
        };
    }

    function spawnBurst(count) {
        const cx = canvas.width  / 2;
        const cy = canvas.height / 2;
        for (let i = 0; i < count; i++) {
            particles.push(createParticle(
                cx + (Math.random() - 0.5) * 100,
                cy + (Math.random() - 0.5) * 100
            ));
        }
        for (let i = 0; i < count / 3; i++) {
            particles.push(createParticle(0,            canvas.height * 0.7));
            particles.push(createParticle(canvas.width, canvas.height * 0.7));
        }
    }

    function animateConfetti() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles = particles.filter(p => p.alpha > 0.05);

        for (const p of particles) {
            p.x  += p.vx;
            p.y  += p.vy;
            p.vy += p.gravity;
            p.vx *= 0.99;
            p.rotation += p.rotSpeed;
            if (p.y > canvas.height * 0.6) p.alpha -= 0.02;

            ctx.save();
            ctx.globalAlpha = p.alpha;
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation * Math.PI / 180);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.width / 2, -p.height / 2, p.width, p.height);
            ctx.restore();
        }

        if (particles.length > 0) {
            animationId = requestAnimationFrame(animateConfetti);
        } else {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    }

    function fireConfetti() {
        if (animationId) cancelAnimationFrame(animationId);
        particles = [];
        spawnBurst(180);
        animateConfetti();
    }

    let goalCompleted = false;

    function calculate() {
        const target  = parseFloat(document.getElementById('target').value);
        const current = parseFloat(document.getElementById('current').value);
        const daily   = parseFloat(document.getElementById('daily').value);

        if (target > 0 && current >= 0) {
            let percent = (current / target) * 100;
            if (percent > 100) percent = 100;

            const bar = document.getElementById('bar');
            bar.style.width = percent.toFixed(1) + '%';
            bar.innerText   = percent > 10 ? '%' + percent.toFixed(1) : '';

            const remaining = target - current;

            if (remaining <= 0) {
                document.getElementById('resultBox').innerHTML = '<b>Hedef Tamamlandı! 🎉</b>';
                if (!goalCompleted) {
                    goalCompleted = true;
                    fireConfetti();
                }
            } else {
                goalCompleted = false;
                if (daily > 0) {
                    const days   = Math.ceil(remaining / daily);
                    const months = (days / 30).toFixed(1);
                    document.getElementById('resultBox').innerHTML =
                        `Kalan: <b>${remaining.toLocaleString()} TL</b><br>` +
                        `<b>${days} gün</b> (~${months} ay) kaldı.`;
                }
            }
        }
    }
</script>

</body>
</html>
